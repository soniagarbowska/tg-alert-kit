<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1000px; }
  body {
    font-family:'Inter','DejaVu Sans',sans-serif;
    background:transparent;
    -webkit-font-smoothing:antialiased;
  }
  .card {
    width:1000px;
    background:linear-gradient(160deg,#1b2030 0%,#141824 100%);
    border-radius:34px;
    overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.06);
  }
  /* pasek statusu na gorze, kolor wg wagi */
  .bar {
    display:flex; align-items:center; gap:22px;
    padding:34px 44px;
    background:var(--accent-grad);
    position:relative;
  }
  .bar .ico {
    width:78px; height:78px; border-radius:20px;
    display:flex; align-items:center; justify-content:center;
    font-size:42px;
    background:rgba(255,255,255,.16);
    backdrop-filter:blur(4px);
  }
  .bar .htxt { flex:1; }
  .bar .title { color:#fff; font-size:38px; font-weight:800; letter-spacing:-.5px; line-height:1.1; }
  .bar .sev { color:rgba(255,255,255,.82); font-size:19px; font-weight:600; text-transform:uppercase; letter-spacing:2px; margin-top:6px; }
  .bar .badge {
    color:#fff; font-size:16px; font-weight:700;
    padding:9px 18px; border-radius:999px;
    background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.18);
    white-space:nowrap;
  }
  /* tresc */
  .body { padding:30px 44px 14px; }
  .row {
    display:flex; align-items:baseline; gap:18px;
    padding:17px 0;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .row:last-child { border-bottom:none; }
  .k { color:#8b94a7; font-size:21px; font-weight:600; min-width:230px; }
  .v { color:#f1f4fa; font-size:23px; font-weight:600; flex:1; }
  .v.mono { font-family:'DejaVu Sans Mono',monospace; letter-spacing:.5px; color:#aee0ff; font-size:21px; }
  /* uwaga */
  .note {
    margin:22px 44px 8px;
    padding:20px 24px;
    background:var(--note-bg);
    border-left:5px solid var(--accent);
    border-radius:14px;
    color:#e7ecf5; font-size:21px; line-height:1.45; font-weight:500;
  }
  /* stopka */
  .foot {
    display:flex; justify-content:space-between; align-items:center;
    padding:22px 44px 30px;
    color:#6c7589; font-size:18px; font-weight:600;
  }
  .foot .id { font-family:'DejaVu Sans Mono',monospace; color:#8b94a7; }
</style>
</head>
<body>
  <div class="card">
    <div class="bar">
      <div class="ico">__ICON__</div>
      <div class="htxt">
        <div class="title">__TITLE__</div>
        <div class="sev">__SEVLABEL__</div>
      </div>
      <div class="badge">__BADGE__</div>
    </div>
    <div class="body">__ROWS__</div>
    __NOTE__
    <div class="foot">
      <span>__FOOTLEFT__</span>
      <span class="id">__ID__</span>
    </div>
  </div>
</body>
</html>
